<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Watch Video Ultra</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
    background: black;
    color: white;
    margin: 0;
    overflow: hidden;
    font-family: sans-serif;
}

.circular-container {
    width: 100vw;
    height: 100vh;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border: 2px solid #001f3f;
}

video {
    width: 90%;
    border-radius: 10px;
    margin-top: 10px;
}

.title {
    font-size: 10px;
    color: #3b82f6;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="circular-container">
    <div class="title">CLEAN STREAM ULTRA</div>

    <video id="player" autoplay muted playsinline>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
    </video>
</div>

<script>
const player = document.getElementById('player');

// Tap en pantalla = play/pause (perfecto para reloj)
document.body.addEventListener('click', () => {
    if (player.paused) {
        player.play();
    } else {
        player.pause();
    }
});
</script>

</body>
</html>
