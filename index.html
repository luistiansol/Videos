<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salud Masculina - Luis</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 5px; }
        .container { max-width: 280px; margin: auto; padding-top: 5px; }
        h2 { font-size: 14px; color: #00ff00; margin: 5px 0; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Calendario */
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 8px; }
        .day { width: 30px; height: 30px; border: 1px solid #222; display: flex; align-items: center; justify-content: center; font-size: 10px; border-radius: 50%; }
        .today { border: 1.5px solid #00ff00; font-weight: bold; }
        .marked { background: #ff4444; border: none; text-decoration: line-through; color: #fff; }

        /* Botones de Acción */
        .btn-main { border: none; padding: 10px; border-radius: 20px; font-weight: bold; width: 95%; font-size: 12px; cursor: pointer; margin-bottom: 8px; display: block; margin-left: auto; margin-right: auto; }
        .btn-limpieza { background: #00ff00; color: #000; }
        .btn-web { background: #333; color: #fff; border: 1px solid #555; text-decoration: none; display: block; line-height: 20px; }
        
        .water-section { border-top: 1px solid #333; padding-top: 8px; font-size: 11px; }
        .btn-water { background: #0088ff; color: #fff; border: none; padding: 6px 12px; border-radius: 12px; font-size: 10px; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h2 id="monthName">Marzo</h2>
        <div class="grid" id="calendar"></div>
        
        <a href="https://www.xvideos.com" target="_blank" class="btn-main btn-web">ABRIR AYUDA (XV)</a>
        
        <button class="btn-main btn-limpieza" onclick="markAction()">REGISTRAR LIMPIEZA</button>

        <div class="water-section">
            <span id="waterCount">Agua: 0 vasos</span><br>
            <button class="btn-water" onclick="addWater()">+ BEBER AGUA</button>
        </div>
    </div>

    <script>
        const storageKey = 'luis_health_v2';
        const waterKey = 'luis_water_today_v2';
        let markedDays = JSON.parse(localStorage.getItem(storageKey)) || [];

        function renderCalendar() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            document.getElementById('monthName').innerText = now.toLocaleString('es', { month: 'long' });
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const calElement = document.getElementById('calendar');
            calElement.innerHTML = '';

            for (let i = 0; i < firstDay; i++) { calElement.innerHTML += '<div></div>'; }

            for (let d = 1; d <= daysInMonth; d++) {
                const dateId = `${year}-${month}-${d}`;
                const isToday = d === now.getDate();
                const isMarked = markedDays.includes(dateId);
                const div = document.createElement('div');
                div.className = `day ${isToday ? 'today' : ''} ${isMarked ? 'marked' : ''}`;
                div.innerText = d;
                calElement.appendChild(div);
            }
            updateWaterUI();
        }

        function markAction() {
            const now = new Date();
            const dateStr = `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}`;
            if (!markedDays.includes(dateStr)) {
                markedDays.push(dateStr);
                localStorage.setItem(storageKey, JSON.stringify(markedDays));
                renderCalendar();
                alert("Limpieza registrada. ¡Buen trabajo!");
            }
        }

        function addWater() {
            let count = parseInt(localStorage.getItem(waterKey)) || 0;
            count++;
            localStorage.setItem(waterKey, count);
            updateWaterUI();
        }

        function updateWaterUI() {
            let count = localStorage.getItem(waterKey) || 0;
            document.getElementById('waterCount').innerText = `Agua: ${count} vasos`;
        }

        // Reset diario de agua
        const lastDate = localStorage.getItem('last_visit_v2');
        const todayStr = new Date().toDateString();
        if (lastDate !== todayStr) {
            localStorage.setItem(waterKey, 0);
            localStorage.setItem('last_visit_v2', todayStr);
        }

        renderCalendar();
    </script>
</body>
</html>
