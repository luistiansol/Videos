<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Who Ultra Edition</title>
    <style>
        /* Estilo optimizado para Samsung Watch Ultra (Circular) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: black; overflow: hidden; font-family: sans-serif; }
        
        .video-container {
            width: 100vw; height: 100vh;
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            scrollbar-width: none;
        }

        .video-card {
            width: 100vw; height: 100vh;
            scroll-snap-align: start;
            display: flex; align-items: center; justify-content: center;
            position: relative;
            border: 3px solid #6A0DAD; /* Púrpura Profundo */
            border-radius: 50%;
        }
        
        video { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            border-radius: 50%;
            filter: brightness(0.6);
        }

        /* Interfaz Ghost / Radar */
        .overlay {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            pointer-events: none;
        }

        .radar-line {
            position: absolute; width: 100%; height: 2px;
            background: #FF0000; /* Rojo Neón */
            box-shadow: 0 0 15px #FF0000;
            animation: scan 2.5s linear infinite;
        }

        @keyframes scan {
            0% { top: 20%; opacity: 0; }
            50% { opacity: 1; }
            100% { top: 80%; opacity: 0; }
        }

        .user-tag {
            background: rgba(255, 0, 0, 0.9);
            color: white; padding: 4px 12px;
            border-radius: 20px; font-size: 10px;
            font-weight: bold; margin-top: 60%;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <div class="video-card">
            <video loop muted autoplay playsinline src="https://assets.mixkit.co/videos/preview/mixkit-red-and-blue-ink-mixing-in-water-23308-large.mp4"></video>
            <div class="overlay">
                <div class="radar-line"></div>
                <div class="user-tag">@ULTRA_RED</div>
            </div>
        </div>
        <div class="video-card">
            <video loop playsinline src="https://assets.mixkit.co/videos/preview/mixkit-abstract-purple-and-blue-liquid-flow-23305-large.mp4"></video>
            <div class="overlay">
                <div class="radar-line"></div>
                <div class="user-tag">@PURPLE_MODE</div>
            </div>
        </div>
    </div>

    <script>
        // Lógica de reproducción automática al deslizar
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                const video = entry.target.querySelector('video');
                if (entry.isIntersecting) { 
                    video.play();
                    // Vibración del Watch al cambiar video
                    if(navigator.vibrate) navigator.vibrate([30, 10, 30]); 
                } else { video.pause(); }
            });
        }, { threshold: 0.6 });
        document.querySelectorAll('.video-card').forEach(card => observer.observe(card));
    </script>
</body>
</html>
