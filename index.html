<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultra Stream</title>
    <style>
        /* Diseño para Samsung Watch Ultra */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: black; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            width: 100vw;
        }
        
        /* El contenedor circular que enmarca el sitio */
        .watch-frame {
            width: 100vw;
            height: 100vh;
            border-radius: 50%;
            border: 4px solid #6A0DAD; /* Púrpura */
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 20px #FF0000; /* Brillo Rojo */
        }

        /* La ventana que carga el sitio web */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        /* Línea de escaneo "Ghost" decorativa en los bordes */
        .scanner {
            position: absolute;
            top: 0; width: 100%; height: 2px;
            background: rgba(255, 0, 0, 0.6);
            box-shadow: 0 0 10px #FF0000;
            z-index: 10;
            pointer-events: none;
            animation: move 4s linear infinite;
        }

        @keyframes move {
            0% { top: 10%; }
            100% { top: 90%; }
        }
    </style>
</head>
<body>
    <div class="watch-frame">
        <div class="scanner"></div>
        <iframe src="https://www.xvideos.com" allowfullscreen></iframe>
    </div>
</body>
</html>
