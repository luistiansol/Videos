    <style>
        body {
            background-color: #000000;
            color: #00ff41; /* Verde Matrix/Hacker */
            font-family: 'Consolas', 'Courier New', monospace;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            -webkit-tap-highlight-color: transparent;
        }
        h2 { 
            font-size: 16px; 
            color: #ffffff; 
            margin: 5px 0; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            width: 90%;
        }
        .hint { 
            font-size: 11px; 
            color: #8b949e; 
            margin: 10px 0 20px 0; 
            font-style: italic; 
        }
        .list-container { 
            width: 100%; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .qr-card {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 25px; /* Optimizado para Watch Ultra */
            padding: 20px;
            margin-bottom: 25px;
            width: 85%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            transition: transform 0.1s ease, opacity 0.2s ease;
        }
        /* Función de purga al tocar */
        .qr-card:active { 
            background: #ff3333; 
            transform: scale(0.85); 
            opacity: 0; 
        }
        .qr-card .qr-drawing {
            background: #ffffff;
            padding: 10px;
            border-radius: 12px;
            display: inline-block;
        }
        .qr-card .code-id {
            margin-top: 15px;
            font-size: 14px;
            font-weight: bold;
            color: #00ff41;
            letter-spacing: 1px;
            word-break: break-all;
        }
        /* Ajustes específicos para pantalla circular */
        @media screen and (max-height: 480px) {
            padding: 10px;
            .qr-card { padding: 15px; margin-bottom: 20px; }
            .qr-card .code-id { font-size: 12px; }
        }
    </style>
</head>
<body>

    <h2>GHR_LEC_SYSTEM</h2>
    <div class="hint">[ TOCAR PARA PURGAR ]</div>

    <div class="list-container" id="codes-list"></div>

    <script>
        // *** SECCIÓN DE DATOS: Códigos EXTRAÍDOS (Simulación Corregida) ***
        // Aquí es donde residen los resultados finales de la extracción.
        const lec_codes = [
            "LEC000000000GO", // El código corregido que especificaste
            "LEC000000001H1",
            "LEC000000002A2",
            "LEC000000003Z9",
            "LEC000000004GO",
            "LEC000000005F7"
        ];
        // ***************************************************************

        const listDiv = document.getElementById('codes-list');

        lec_codes.forEach((code, index) => {
            // 1. Crear el contenedor (Card)
            const card = document.createElement('div');
            card.className = 'qr-card';
            
            // 2. Crear el contenedor del dibujo QR
            const qrDrawingCont = document.createElement('div');
            qrDrawingCont.className = 'qr-drawing';
            const qrId = 'qr-' + index;
            qrDrawingCont.id = qrId;
            
            // 3. Crear la etiqueta del código
            const label = document.createElement('div');
            label.className = 'code-id';
            label.innerText = code;

            // Ensamblar
            card.appendChild(qrDrawingCont);
            card.appendChild(label);
            listDiv.appendChild(card);

            // 4. Generar el QR internamente (Strict Offline)
            new QRCode(document.getElementById(qrId), {
                text: code,
                width: 150, // Optimizado para reloj
                height: 150,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H // Máxima corrección
            });

            // 5. Asignar evento de purga (tap-to-delete)
            card.addEventListener('touchend', function() {
                this.style.opacity = '0';
                this.style.transform = 'scale(0.5)';
                setTimeout(() => this.remove(), 250);
            });
            // Soporte para mouse para pruebas
            card.addEventListener('click', function() {
                this.style.opacity = '0';
                this.style.transform = 'scale(0.5)';
                setTimeout(() => this.remove(), 250);
            });
        });
    </script>
</body>
</html>
