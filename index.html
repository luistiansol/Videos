<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultra Stealth Stream</title>
    <style>
        /* Optimización para Pantalla Circular AMOLED */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: black; overflow: hidden; height: 100vh; width: 100vw; font-family: sans-serif; }
        
        .container {
            width: 100vw; height: 100vh;
            border-radius: 50%;
            border: 3px solid #6A0DAD; /* Púrpura */
            position: relative;
            overflow: hidden;
        }

        /* El sitio web solicitado */
        iframe {
            width: 100%; height: 100%;
            border: none;
            background: black;
        }

        /* Botón Invisible de Pánico (Zona Superior) */
        .panic-btn {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 30%;
            z-index: 100;
            background: transparent;
        }

        /* Pantalla de Bloqueo "Ghost" (Falsa) */
        #ghost-screen {
            position: absolute;
            inset: 0;
            background: black;
            color: #333;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            font-size: 12px;
        }

        /* Línea de Radar Roja Estética */
        .radar {
            position: absolute;
            width: 100%; height: 1px;
            background: #FF0000;
            box-shadow: 0 0 8px #FF0000;
            z-index: 50;
            pointer-events: none;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 20%; opacity: 0; }
            50% { opacity: 0.5; }
            100% { top: 80%; opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="panic-btn" onclick="toggleGhost()"></div>
        <div class="radar"></div>
        
        <iframe src="https://www.xvideos.com" allow="autoplay"></iframe>

        <div id="ghost-screen" onclick="toggleGhost()">
            <p id="clock"></p>
            <p style="font-size: 8px; margin-top: 5px;">SISTEMA ACTIVO</p>
        </div>
    </div>

    <script>
        function toggleGhost() {
            const ghost = document.getElementById('ghost-screen');
            ghost.style.display = (ghost.style.display === 'flex') ? 'none' : 'flex';
            if(navigator.vibrate) navigator.vibrate(20);
        }

        // Reloj para la pantalla de seguridad
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.getHours() + ":" + now.getMinutes().toString().padStart(2, '0');
        }, 1000);
    </script>
</body>
</html>
