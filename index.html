<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KN Picker - QR Cycle Counts</title>
    <style>
        :root {
            --bg: #000; --card: #1c1c1e; --text: #fff; --accent: #0a84ff;
            --warning: #ffd60a; --success: #30d158; --undo: #ff453a;
        }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; overscroll-behavior: none; }
        
        .header { position: sticky; top: 0; background: #111; padding: 12px; border-bottom: 1px solid #333; z-index: 100; }
        .row-1 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        #undo-btn { background: var(--undo); color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: bold; font-size: 0.8rem; display: none; cursor: pointer; }
        .row-2 { font-size: 0.9rem; font-weight: bold; margin-bottom: 10px; }
        .progress-container { width: 100%; height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
        #progress-bar { width: 0%; height: 100%; background: var(--success); transition: 0.4s; }
        
        .list-container { padding: 10px 5px; display: flex; flex-direction: column; gap: 10px; }
        .pallet-card { 
            background: var(--card); border: 1px solid #333; border-radius: 15px; 
            padding: 15px; text-align: center; 
            display: flex; flex-direction: column; align-items: center;
        }
        .pallet-card:active { background: #333; transform: scale(0.98); }
        .small-loc { font-size: 1rem; font-weight: bold; color: var(--warning); margin-bottom: 8px; }
        
        .qr-box {
            background: #fff; 
            padding: 10px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 8px;
        }
        .qr-box img { width: 150px; height: 150px; }

        .lpn-text { font-size: 0.9rem; opacity: 0.6; font-family: monospace; font-weight: bold; }
        
        .footer-btn { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 90%; z-index: 200; }
        #download-btn { width: 100%; padding: 15px; border-radius: 30px; border: none; background: #002d72; color: white; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div class="header">
        <div class="row-1">
            <span>Pending: <span id="count" style="color:var(--accent)">0</span></span>
            <button id="undo-btn" onclick="undoDelete()">UNDO</button>
        </div>
        <div class="row-2">Last: <span id="last-text" style="color:var(--success)">None</span></div>
        <div class="progress-container"><div id="progress-bar"></div></div>
    </div>

    <div id="pallet-list" class="list-container"></div>

    <div class="footer-btn">
        <button id="download-btn" onclick="generateReport()">💾 SAVE CYCLE REPORT</button>
    </div>

    <canvas id="reportCanvas" style="display:none;"></canvas>

    <script>
        const masterList = [
            { lpn: "LEC00000000Q1", loc: "BD40A002" }, { lpn: "LEC00000000PR", loc: "BD40A003" },
            { lpn: "LEC00000000OJ", loc: "BD40B001" }, { lpn: "LEC00000000OK", loc: "BD40B002" },
            { lpn: "LEC00000000OG", loc: "BD40B003" }, { lpn: "LEC00000000Q7", loc: "BD40C001" },
            { lpn: "LEC00000000Q7", loc: "BD40C002" }, { lpn: "LEC00000000OT", loc: "BD40C003" },
            { lpn: "LEC00000000Q0", loc: "BD40D001" }, { lpn: "LEC00000000OU", loc: "BD40D002" },
            { lpn: "LEC00000000OW", loc: "BD42A001" }, { lpn: "LEC00000000OI", loc: "BD42A002" },
            { lpn: "LEC00000000OI", loc: "BD42A003" }, { lpn: "LEC00000000OQ", loc: "BD42B001" },
            { lpn: "LEC00000000VP", loc: "BD42B002" }, { lpn: "LEC00000000VR", loc: "BD42B003" },
            { lpn: "LEC00000000VT", loc: "BD42C001" }
        ].sort((a, b) => a.loc.localeCompare(b.loc));

        let pallets = [...masterList];
        const totalInit = pallets.length;
        let worked = []; let lastDeleted = null;

        const listDiv = document.getElementById('pallet-list');
        const countSpan = document.getElementById('count');
        const lastText = document.getElementById('last-text');
        const undoBtn = document.getElementById('undo-btn');
        const downloadBtn = document.getElementById('download-btn');
        const progressBar = document.getElementById('progress-bar');

        function render() {
            listDiv.innerHTML = '';
            countSpan.innerText = pallets.length;
            progressBar.style.width = ((worked.length / totalInit) * 100) + '%';
            downloadBtn.style.display = (pallets.length === 0) ? 'block' : 'none';

            pallets.forEach((item, index) => {
                const card = document.createElement('div');
                card.className = 'pallet-card';
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${item.lpn}`;
                card.innerHTML = `
                    <div class="small-loc">${item.loc}</div>
                    <div class="qr-box">
                        <img src="${qrUrl}" alt="QR LPN">
                    </div>
                    <div class="lpn-text">${item.lpn}</div>
                `;
                card.onclick = () => {
                    lastDeleted = { data: pallets[index], index: index };
                    document.getElementById('last-text').innerText = `Scanned: ${item.lpn}`;
                    worked.push(item); pallets.splice(index, 1);
                    document.getElementById('undo-btn').style.display = 'block';
                    render();
                };
                listDiv.appendChild(card);
            });
        }

        function undoDelete() {
            if (lastDeleted) {
                pallets.splice(lastDeleted.index, 0, lastDeleted.data);
                worked.pop(); lastDeleted = null;
                document.getElementById('undo-btn').style.display = 'none';
                document.getElementById('last-text').innerText = worked.length > 0 ? `Scanned: ${worked[worked.length-1].lpn}` : "None";
                render();
            }
        }

        function generateReport() {
            const canvas = document.getElementById('reportCanvas'); const ctx = canvas.getContext('2d');
            canvas.width = 500; canvas.height = 150 + (worked.length * 28);
            ctx.fillStyle = "white"; ctx.fillRect(0,0,500,canvas.height);
            ctx.fillStyle = "#002d72"; ctx.font = "bold 20px Arial"; ctx.fillText("CYCLE COUNT QR REPORT", 30, 40);
            ctx.fillStyle = "black"; ctx.font = "14px Courier";
            worked.forEach((p, i) => ctx.fillText(`${(i+1).toString().padStart(2,'0')}. QR SCANNED: ${p.lpn.padEnd(16)} | LOC: ${p.loc}`, 30, 100 + (i * 28)));
            ctx.fillStyle = "#002d72"; ctx.fillRect(0, canvas.height-60, 500, 60);
            ctx.fillStyle = "white"; ctx.fillText("Completed: " + new Date().toLocaleString(), 30, canvas.height-25);
            const link = document.createElement('a'); link.download = 'Cycle_QR_Report.png'; link.href = canvas.toDataURL(); link.click();
        }
        render();
    </script>
</body>
</html>
