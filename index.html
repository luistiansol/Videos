<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sperm Health Tracker</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        h2 { font-size: 14px; color: #00ff00; margin-bottom: 5px; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; max-width: 280px; margin: auto; }
        .day { width: 35px; height: 35px; border: 1px solid #333; display: flex; align-items: center; justify-content: center; font-size: 12px; border-radius: 50%; }
        .today { border: 2px solid #fff; font-weight: bold; }
        .marked { background: #ff4444; color: white; border: none; text-decoration: line-through; opacity: 0.5; }
        button { margin-top: 15px; padding: 10px; border-radius: 20px; border: none; background: #00ff00; color: #000; font-weight: bold; width: 80%; }
    </style>
</head>
<body>
    <h2 id="monthName">Marzo 2026</h2>
    <div class="grid" id="calendar"></div>
    <button onclick="markAction()">MARCAR EYACULACIÓN</button>

    <script>
        const storageKey = 'sperm_tracker_data';
        let markedDays = JSON.parse(localStorage.getItem(storageKey)) || [];

        function renderCalendar() {
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth();
            document.getElementById('monthName').innerText = now.toLocaleString('es', { month: 'long', year: 'numeric' });
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const calElement = document.getElementById('calendar');
            calElement.innerHTML = '';

            for (let i = 0; i < firstDay; i++) { calElement.innerHTML += '<div></div>'; }

            for (let d = 1; d <= daysInMonth; d++) {
                const isToday = d === now.getDate();
                const isMarked = markedDays.includes(`${year}-${month}-${d}`);
                const div = document.createElement('div');
                div.className = `day ${isToday ? 'today' : ''} ${isMarked ? 'marked' : ''}`;
                div.innerText = d;
                calElement.appendChild(div);
            }
        }

        function markAction() {
            const now = new Date();
            const dateStr = `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}`;
            if (!markedDays.includes(dateStr)) {
                markedDays.push(dateStr);
                localStorage.setItem(storageKey, JSON.stringify(markedDays));
                renderCalendar();
                alert("¡Día marcado! Recuerda hidratarte bien hoy.");
            }
        }

        renderCalendar();
    </script>
</body>
</html>
